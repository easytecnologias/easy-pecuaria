server {
  listen 80;
  server_name _;

  # não expor a versão do nginx
  server_tokens off;

  # headers de segurança (aplicados a todas as respostas)
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
  add_header Content-Security-Policy "default-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self'; font-src 'self' data:; connect-src 'self'; frame-ancestors 'self'; base-uri 'self'; form-action 'self'" always;

  root /usr/share/nginx/html;
  index index.html;

  # SPA — todas as rotas caem no index.html
  location / {
    try_files $uri $uri/ /index.html;
  }

  # API: /api/... -> pecuaria-api:8000/... (a barra final remove o prefixo /api)
  location /api/ {
    proxy_pass http://pecuaria-api:8000/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location ~* \.(?:css|js|ico|png|jpg|jpeg|gif|svg|webp)$ {
    expires 7d;
    add_header Cache-Control "public";
    try_files $uri =404;
  }
}
