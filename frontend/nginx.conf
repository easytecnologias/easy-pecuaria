server {
  listen 80;
  listen 443 ssl;
  server_name _;

  # HTTPS (certificado interno para testes; em produção, domínio + Let's Encrypt)
  ssl_certificate     /etc/nginx/certs/server.crt;
  ssl_certificate_key /etc/nginx/certs/server.key;
  ssl_protocols TLSv1.2 TLSv1.3;

  # não expor a versão do nginx
  server_tokens off;

  # headers de segurança (aplicados a todas as respostas)
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
  add_header Content-Security-Policy "default-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self'; worker-src 'self'; manifest-src 'self'; font-src 'self' data:; connect-src 'self'; frame-ancestors 'self'; base-uri 'self'; form-action 'self'" always;

  root /usr/share/nginx/html;
  index index.html;

  # CA interna para download/instalação nos celulares (habilita HTTPS confiável)
  location = /ca.crt {
    alias /etc/nginx/certs/ca.crt;
    default_type application/x-x509-ca-cert;
    add_header Content-Disposition 'attachment; filename="pecuaria-jln-ca.crt"';
  }

  # PWA: service worker nunca cacheado (para receber atualizações na hora)
  location = /sw.js { add_header Cache-Control "no-cache, no-store, must-revalidate"; try_files $uri =404; }
  location = /registerSW.js { add_header Cache-Control "no-cache"; try_files $uri =404; }
  location = /manifest.webmanifest { default_type application/manifest+json; try_files $uri =404; }

  # SPA — todas as rotas caem no index.html
  location / {
    try_files $uri $uri/ /index.html;
  }

  # API: /api/... -> pecuaria-api:8000/... (a barra final remove o prefixo /api)
  location /api/ {
    proxy_pass http://pecuaria-api:8000/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location ~* \.(?:css|js|ico|png|jpg|jpeg|gif|svg|webp)$ {
    expires 7d;
    add_header Cache-Control "public";
    try_files $uri =404;
  }
}
